technique_id: T1070.004
name: File Deletion (Defense Evasion)
tactic: Defense Evasion
description: >
  Simulates the deletion of files to cover tracks after an attack, a common
  defense evasion technique. Attackers often delete logs, tools, or payloads
  after use to hinder forensic investigation.
platforms: [windows]

payloads:
  - name: Delete PowerShell console history
    executor: powershell
    elevation_required: false
    command: >
      $histPath = "$env:APPDATA\Microsoft\Windows\PowerShell\PSReadLine\ConsoleHost_history.txt";
      if (!(Test-Path $histPath)) { New-Item -Path $histPath -Force | Out-Null };
      Remove-Item -Path $histPath -Force;
      Write-Host "[AttackSight] PowerShell history deleted (T1070.004 simulation)"
    cleanup: ""
    description: >
      Deletes the PowerShell console history file to simulate attacker
      covering tracks. Triggers Sysmon EID 23 (file deletion).

  - name: Delete via cmd (alternate executor)
    executor: cmd
    elevation_required: false
    command: >
      echo AttackSight test > %TEMP%\attacksight_cmd_test.txt &&
      del /f /q %TEMP%\attacksight_cmd_test.txt &&
      echo [AttackSight] File created and deleted via cmd.exe
    cleanup: ""
    description: Simulates cmd.exe-based file deletion, triggering process and file events.

expected_logs:
  - source: Microsoft-Windows-Sysmon/Operational
    event_id: 23
    field_hints:
      TargetFilename: "*ConsoleHost_history*"
  - source: Microsoft-Windows-Sysmon/Operational
    event_id: 11
    field_hints:
      TargetFilename: "*attacksight*"

sigma_rules:
  - sigma_rules/file_delete_win_delete_powershell_command_history.yml

mitre:
  tactic: Defense Evasion
  technique: T1070.004
  url: https://attack.mitre.org/techniques/T1070/004/

references:
  - https://attack.mitre.org/techniques/T1070/004/